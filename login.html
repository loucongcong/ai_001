<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * { box-sizing: border-box; }
        :root { color-scheme: dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 20% 20%, rgba(120, 119, 255, 0.35), transparent 28%),
                radial-gradient(circle at 80% 30%, rgba(0, 214, 255, 0.3), transparent 24%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 153, 0.25), transparent 26%),
                linear-gradient(135deg, #050816 0%, #090b1a 45%, #121d3f 100%);
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            color: #e9f2ff;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(177, 200, 255, 0.2);
            background: rgba(9, 16, 40, 0.74);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
        }
        h2 {
            margin: 0 0 10px;
            font-size: 26px;
            letter-spacing: 0.02em;
            background: linear-gradient(90deg, #ffffff 0%, #8bf5ff 35%, #a48cff 70%, #ff77c8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tip {
            margin: 0 0 16px;
            color: #a7bedf;
            font-size: 13px;
            line-height: 1.6;
        }
        input {
            width: 100%;
            padding: 11px 12px;
            font-size: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(151, 176, 255, 0.3);
            border-radius: 10px;
            background: rgba(13, 21, 48, 0.88);
            color: #eaf3ff;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        input::placeholder {
            color: #93acd6;
        }
        input:focus {
            border-color: rgba(109, 186, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(96, 186, 255, 0.2);
        }
        button {
            width: 100%;
            padding: 11px 12px;
            border: 0;
            border-radius: 10px;
            font-weight: 700;
            color: #081122;
            background: linear-gradient(135deg, #62d4ff, #7a69ff 55%, #f06bc4);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(122, 105, 255, 0.42);
        }
        .status {
            margin: 12px 0 0;
            font-size: 13px;
            color: #a7bedf;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>欢迎使用</h2>
        <p class="tip">无需账号，请输入你的名字继续。</p>
        <input id="nameInput" placeholder="请输入名字">
        <button id="loginBtn">进入聊天</button>
        <p id="status" class="status">就绪</p>
    </div>

    <script>
        const USER_NAME_KEY = "dashscope_user_name";
        const WELCOME_SEEN_KEY = "dashscope_welcome_seen";
        const nameInput = document.getElementById("nameInput");
        const loginBtn = document.getElementById("loginBtn");
        const statusEl = document.getElementById("status");

        function setStatus(text) {
            statusEl.textContent = text;
        }

        window.addEventListener("DOMContentLoaded", () => {
            const savedName = localStorage.getItem(USER_NAME_KEY);
            if (savedName) {
                window.location.href = "./index.html";
                return;
            }
            const hasSeenWelcome = sessionStorage.getItem(WELCOME_SEEN_KEY) === "1";
            if (!hasSeenWelcome) {
                window.location.href = "./welcome.html";
                return;
            }
            nameInput.focus();
        });

        function login() {
            const name = nameInput.value.trim();
            if (!name) {
                setStatus("请输入名字后再继续。");
                return;
            }
            localStorage.setItem(USER_NAME_KEY, name);
            window.location.href = "./index.html";
        }

        loginBtn.addEventListener("click", login);
        nameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                login();
            }
        });
    </script>
</body>
</html>
