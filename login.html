<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f2f4f7;
            font-family: Arial, sans-serif;
            color: #222;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h2 {
            margin: 0 0 8px;
            font-size: 22px;
        }
        .tip {
            margin: 0 0 14px;
            color: #666;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 10px 12px;
            cursor: pointer;
        }
        .status {
            margin: 10px 0 0;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>欢迎使用</h2>
        <p class="tip">无需账号，请输入你的名字继续。</p>
        <input id="nameInput" placeholder="请输入名字">
        <button id="loginBtn">进入聊天</button>
        <p id="status" class="status">就绪</p>
    </div>

    <script>
        const USER_NAME_KEY = "dashscope_user_name";
        const nameInput = document.getElementById("nameInput");
        const loginBtn = document.getElementById("loginBtn");
        const statusEl = document.getElementById("status");

        function setStatus(text) {
            statusEl.textContent = text;
        }

        window.addEventListener("DOMContentLoaded", () => {
            const savedName = localStorage.getItem(USER_NAME_KEY);
            if (savedName) {
                window.location.href = "./index.html";
                return;
            }
            nameInput.focus();
        });

        function login() {
            const name = nameInput.value.trim();
            if (!name) {
                setStatus("请输入名字后再继续。");
                return;
            }
            localStorage.setItem(USER_NAME_KEY, name);
            window.location.href = "./index.html";
        }

        loginBtn.addEventListener("click", login);
        nameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                login();
            }
        });
    </script>
</body>
</html>
